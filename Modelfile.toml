name = "finance_py"
# run = "docker run --rm -v \"$PWD/run:/run\" ${IMAGE} ${ARGS}"
run = "docker run --rm -v \"$PWD/run:/run\" ${IMAGE} ${ARGS} > run/bond_metrics.output.json"
image = "financepy-runner:local"
# args = ["--in", "{input:finance_py_input}", "--out", "{output:output_data}"]
args = ["{input:damage_estimates}"]

[[inputs]]
# TODO: this should eventually support URLs as well as local files
name = "damage_estimates"

[inputs.schema]
type = "object"
# No required fields: when chaining from DicePy, only climate risk fields
# (climate_risk_premium, damage_fraction, etc.) are present — bond parameters
# (issue_date, maturity_date, coupon_rate, etc.) are not in that output.
# The runner is expected to supply defaults for any missing bond parameters,
# making this model composable both standalone (full params via file) and
# as a downstream step (climate risk data from DicePy, bond params defaulted).
required = []

[[outputs]]
name = "bond_metrics"

[outputs.schema]
type = "object"
required = ["clean_price", "dirty_price", "accrued_interest", "macauley_duration", "modified_duration", "convexity", "ytm"]
